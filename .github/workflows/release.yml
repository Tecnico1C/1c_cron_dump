name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Windows EXE
        run: |
          go build -ldflags="-s -w" -o myapp.exe

      - name: Zip binary
        run: |
          Compress-Archive myapp.exe myapp-windows-amd64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-windows-amd64.zip
