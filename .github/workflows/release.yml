name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: windows
            goos: windows
            goarch: amd64
            output: cron-dump.exe
            archive: cron-dump-windows-amd64.zip

          - os: linux
            goos: linux
            goarch: amd64
            output: cron-dump
            archive: cron-dump-linux-amd64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=${GITHUB_SHA}
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags="\
            -s -w \
            -X main.Version=$VERSION \
            -X main.Commit=$COMMIT \
            -X main.Date=$DATE" \
            -o ${{ matrix.output }}

      - name: Archive (Windows)
        if: matrix.goos == 'windows'
        run: |
          zip ${{ matrix.archive }} ${{ matrix.output }}

      - name: Archive (Linux)
        if: matrix.goos == 'linux'
        run: |
          tar -czvf ${{ matrix.archive }} ${{ matrix.output }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}